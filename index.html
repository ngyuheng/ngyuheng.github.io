<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ngyuheng</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script src="src/js/index.js" defer></script>
</head>
<body>
    <header> 
        <div class="logo">
            <h4 id="logo-text">ngyuheng</h4>
        </div>
        
        <div class="header-button">
            <div>
                <button title="Change Languages" class="change-lang" onclick="showLanguages()">
                    <img src="src/icons/language.png" alt="lang" class="icons lang">
                </button>
                <div class="lang-dropdown">
                    <div class="lang-button"><button title="English" onclick="changeLanguage('en')">EN</button></div>
                    <div class="lang-button"><button title="Chinese" onclick="changeLanguage('zh')">中文</button></div>
                    <div class="lang-button"><button title="German" onclick="changeLanguage('de')">DE</button></div>
                </div>
            </div>
    
            <a href="interactives.html" title="Interactives">
                <img src="src/icons/interactives.png" alt="interact" class="icons">
            </a>
        </div>
    </header>
    <div class="main-content">
        <h1 id="construction-msg">This Page is Currently Under Construction</h1>
        <img src="src/img/construction cat.png" alt="under-construction" class="construction-img">
    </div>
</body>
</html>
